<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập hệ thống IoT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h2>Đăng nhập hệ thống IoT</h2>

      <label for="usernameInput">Email</label>
      <input id="usernameInput" type="email" placeholder="Nhập email" />

      <label for="passwordInput">Mật khẩu</label>
      <input id="passwordInput" type="password" placeholder="Nhập mật khẩu" />

      <button id="loginBtn" class="login-btn">Đăng nhập</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
